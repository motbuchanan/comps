<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Solid Services — Workhorse</title>
<style>
  :root{ --coal:#191715; --panel:#221f1c; --panel2:#2a2622; --text:#efe9e1; --mute:#a89a8c; --clay:#c07a44; --amber:#e0a066; --steel:#5c7884; --line:#38322c; }
  *{box-sizing:border-box; margin:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--coal); color:var(--text); font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased;}
  img{max-width:100%; display:block;}
  h1,h2,h3{font-weight:900; letter-spacing:.01em; line-height:1.02; text-transform:uppercase;}
  section{padding:56px 20px;}
  .wrap{max-width:820px; margin:0 auto;}
  h2{font-size:clamp(28px,7vw,46px); position:relative; display:inline-block;}
  h2::after{content:""; position:absolute; left:0; bottom:-10px; height:5px; width:0; background:var(--amber);
    transition:width .6s cubic-bezier(.3,.7,.3,1);}
  .in h2::after{width:64px;}
  .sechead{margin-bottom:30px;}
  .sub{color:var(--mute); margin-top:22px; font-size:15.5px; max-width:600px;}
  a{color:inherit;}
  .btn{display:inline-block; font-weight:900; font-size:16px; padding:16px 28px; border-radius:6px;
    text-decoration:none; text-transform:uppercase; letter-spacing:.06em;
    transition:transform .12s ease;}
  .btn-primary{background:var(--amber); color:#221304;}
  .btn-primary:hover{transform:translateY(-2px);}
  .btn-ghost{background:transparent; color:var(--text); border:2px solid var(--line);}
  .btn-ghost:hover{border-color:var(--amber);}

  header{padding:72px 20px 56px; border-bottom:4px solid var(--clay);
    background:linear-gradient(180deg,#221f1c 0%,#191715 100%);}
  .htop{font-size:13px; letter-spacing:.28em; text-transform:uppercase; color:var(--amber); font-weight:900;}
  header h1{font-size:clamp(44px,12vw,86px); margin-top:14px;}
  header h1 span{color:var(--amber);}
  .blunt{margin-top:14px; font-size:clamp(17px,4vw,22px); font-weight:900; letter-spacing:.14em;
    text-transform:uppercase; color:var(--steel);}
  .phone-big{display:inline-block; margin-top:30px; font-size:clamp(26px,7vw,40px); font-weight:900;
    color:#221304; background:var(--amber); padding:14px 26px; border-radius:8px; text-decoration:none; letter-spacing:.02em;}
  .phone-sub{margin-top:12px; color:var(--mute); font-size:13.5px; letter-spacing:.18em; text-transform:uppercase; font-weight:700;}

  .rates{border-bottom:1px solid var(--line);}
  .ratecard{background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden; margin-top:6px;}
  .rrow{display:flex; align-items:baseline; gap:12px; padding:18px 20px; border-bottom:1px solid var(--line); font-size:16px;}
  .rrow:last-child{border-bottom:none;}
  .rrow .rn{font-weight:900; text-transform:uppercase; font-size:14.5px; letter-spacing:.04em;}
  .rrow .rd{color:var(--mute); font-size:13px; margin-top:3px; text-transform:none; font-weight:400;}
  .rrow .dots{flex:1; border-bottom:2px dotted var(--line); transform:translateY(-4px);}
  .rrow .rp{font-weight:900; color:var(--amber); font-size:19px; white-space:nowrap;}
  .samplenote{margin-top:12px; color:var(--steel); font-size:12.5px; letter-spacing:.14em; text-transform:uppercase; font-weight:700;}

  .fix-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;}
  @media(min-width:640px){ .fix-grid{grid-template-columns:repeat(3,1fr);} }
  .fx{background:var(--panel); border:1px solid var(--line); border-left:4px solid var(--clay);
    padding:16px 14px; font-weight:900; text-transform:uppercase; font-size:14px; letter-spacing:.03em;}
  .fx small{display:block; margin-top:6px; color:var(--mute); font-weight:400; text-transform:none; font-size:12.5px; letter-spacing:0;}

  .proof{border-top:1px solid var(--line); border-bottom:1px solid var(--line); background:var(--panel);}
  .pgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;}
  .pgrid img{aspect-ratio:4/3; object-fit:cover; width:100%; border:1px solid var(--line);}

  .straight{display:flex; gap:10px 28px; flex-wrap:wrap; margin-top:6px;}
  .straight span{font-weight:900; text-transform:uppercase; font-size:14px; letter-spacing:.06em; padding-left:18px; position:relative;}
  .straight span::before{content:""; position:absolute; left:0; top:50%; transform:translateY(-50%);
    width:8px; height:8px; background:var(--amber);}

  footer{background:var(--panel); border-top:4px solid var(--clay); text-align:center; padding:64px 20px;}
  footer h2::after{left:50%; transform:translateX(-50%);}
  footer .area{margin-top:26px; color:var(--mute); font-size:14.5px; max-width:520px; margin-left:auto; margin-right:auto;}
  footer .phone-big{margin-top:26px;}
  .fine{margin-top:30px; font-size:12px; color:#6e6357;}
  .vbadge{position:fixed; left:10px; bottom:10px; z-index:50; background:var(--panel); border:1px solid var(--line);
    color:var(--mute); font-size:11px; padding:5px 9px; border-radius:8px;}
  .fadeblock{opacity:0; transform:translateY(12px); transition:opacity .5s ease, transform .5s ease;}
  .fadeblock.in{opacity:1; transform:none;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition-duration:.001s !important; scroll-behavior:auto !important;}
    .fadeblock{opacity:1; transform:none;} h2::after{width:64px;}
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="htop" id="c-top"></div>
    <h1><span>Rock Solid</span><br>Services</h1>
    <div class="blunt" id="c-blunt"></div>
    <a class="phone-big" id="c-phone" href="#"></a>
    <div class="phone-sub" id="c-phonesub"></div>
  </div>
</header>

<section class="rates fadeblock">
  <div class="wrap">
    <div class="sechead"><h2>What it costs</h2></div>
    <div class="ratecard" id="c-rates"></div>
    <div class="samplenote" id="c-samplenote"></div>
  </div>
</section>

<section class="fadeblock">
  <div class="wrap">
    <div class="sechead"><h2>What we fix</h2></div>
    <div class="fix-grid" id="c-fixes"></div>
  </div>
</section>

<section class="proof fadeblock">
  <div class="wrap">
    <div class="sechead"><h2>Proof</h2></div>
    <div class="pgrid" id="c-proof"></div>
  </div>
</section>

<section class="fadeblock">
  <div class="wrap">
    <div class="sechead"><h2>Straight talk</h2></div>
    <div class="straight" id="c-straight"></div>
  </div>
</section>

<footer class="fadeblock">
  <h2 id="c-close"></h2>
  <div class="area" id="c-area"></div>
  <a class="phone-big" id="c-phone2" href="#"></a>
  <div class="fine">Design preview by Mot Buchanan · "Workhorse" direction · prices shown are samples</div>
</footer>

<div class="vbadge" id="vbadge"></div>

<script>
"use strict";
/* ================= CONFIG =================
   DIRECTION: "Workhorse" — blunt, industrial, prices up front.
   One motion moment: the amber rule that draws under each heading on scroll.
   ========================================== */
var CONFIG = {
  top: "Well & water · Ashland, Ohio",
  blunt: "Wells. Water. Done.",
  phone: "4195550100",
  phoneDisplay: "(419) 555-0100",
  phoneSub: "Text or call · no-water calls jump the line",
  rates: [
    { n: "Service call", d: "Comes off the bill if we do the work", p: "$75" },
    { n: "Water test", d: "Know what's in it before you buy anything", p: "$60" },
    { n: "Pressure tank swap", d: "Tank, fittings, haul-away", p: "from $650" },
    { n: "Pump replacement", d: "Quoted after we see the setup — no surprises after", p: "quoted flat" },
    { n: "Water line / trenching", d: "By the run, quoted on site", p: "quoted flat" }
  ],
  sampleNote: "Sample numbers — real prices confirmed before launch",
  fixes: [
    { n: "No water", s: "Pump, switch, or power. Found fast." },
    { n: "Low pressure", s: "Tank or tired pump." },
    { n: "Rusty water", s: "Iron. Tested, then treated." },
    { n: "Wet spot in the yard", s: "Buried leak. Minimal digging." },
    { n: "Pump won't shut off", s: "Don't sit on it — it eats pumps." },
    { n: "Rotten-egg smell", s: "Sulfur. Fixable." }
  ],
  proof: [
    "https://images.squarespace-cdn.com/content/v1/67dc550166a7a678e3eb6908/5f7a69c3-5f6a-49b8-9035-fc11b7b0df0c/545913879_122142387218804695_4050206806843302217_n.jpg",
    "https://images.squarespace-cdn.com/content/v1/67dc550166a7a678e3eb6908/207817c6-7e08-47e1-92f6-fb6d4adebc4e/PXL_20250424_201608435.jpg",
    "https://images.squarespace-cdn.com/content/v1/67dc550166a7a678e3eb6908/186788ac-6793-40ea-82e0-4332993e59d0/PXL_20250428_175923083.jpg",
    "https://images.squarespace-cdn.com/content/v1/67dc550166a7a678e3eb6908/29748cb3-c7ba-466c-a03b-2df4b9491a84/main+image.jpeg"
  ],
  straight: ["No call center", "No upsell", "Licensed & insured", "Cleaned up when we leave"],
  close: "Get it fixed",
  area: "Ashland County and the neighbors — Loudonville, Perrysville, Jeromesville, Savannah, Polk, Mansfield, Wooster.",
  version: "workhorse · v1 · Jul 19"
};
/* ========================================== */
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

function build(){
  document.title = "Rock Solid Services — Workhorse";
  $("c-top").textContent = CONFIG.top;
  $("c-blunt").textContent = CONFIG.blunt;
  $("c-phonesub").textContent = CONFIG.phoneSub;
  $("c-samplenote").textContent = CONFIG.sampleNote;
  $("c-close").textContent = CONFIG.close;
  $("c-area").textContent = CONFIG.area;
  var p1 = $("c-phone"), p2 = $("c-phone2");
  p1.textContent = CONFIG.phoneDisplay; p2.textContent = CONFIG.phoneDisplay;
  p1.href = "sms:"+CONFIG.phone; p2.href = "sms:"+CONFIG.phone;

  var r = "";
  for (var i=0;i<CONFIG.rates.length;i++){
    var rr = CONFIG.rates[i];
    r += '<div class="rrow"><div><div class="rn">'+esc(rr.n)+'</div><div class="rd">'+esc(rr.d)+'</div></div>'
       + '<div class="dots"></div><div class="rp">'+esc(rr.p)+'</div></div>';
  }
  $("c-rates").innerHTML = r;

  var f = "";
  for (var j=0;j<CONFIG.fixes.length;j++){
    f += '<div class="fx">'+esc(CONFIG.fixes[j].n)+'<small>'+esc(CONFIG.fixes[j].s)+'</small></div>';
  }
  $("c-fixes").innerHTML = f;

  var pr = "";
  for (var k=0;k<CONFIG.proof.length;k++) pr += '<img alt="" src="'+esc(CONFIG.proof[k])+'">';
  $("c-proof").innerHTML = pr;

  var st = "";
  for (var s2=0;s2<CONFIG.straight.length;s2++) st += "<span>"+esc(CONFIG.straight[s2])+"</span>";
  $("c-straight").innerHTML = st;

  $("vbadge").textContent = CONFIG.version;

  var blocks = document.querySelectorAll(".fadeblock");
  if ("IntersectionObserver" in window){
    var io = new IntersectionObserver(function(es){
      for (var e=0;e<es.length;e++) if (es[e].isIntersecting){ es[e].target.classList.add("in"); io.unobserve(es[e].target); }
    }, {threshold:.12});
    for (var b=0;b<blocks.length;b++) io.observe(blocks[b]);
  } else {
    for (var b2=0;b2<blocks.length;b2++) blocks[b2].classList.add("in");
  }
}
build();
</script>
</body>
</html>
