<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Sword Artisan</title>
<style>
  :root{
    --coal:#171310; --coal2:#1f1813; --hide:#241c14; --hideline:#3a2c1f;
    --parch:#efe3cf; --parch2:#e4d4b8; --ember:#ff7a2f; --emberdeep:#c9491a;
    --brass:#c9973f; --smoke:#a8917a; --inkdark:#241a10;
  }
  *{box-sizing:border-box; margin:0;}
  body{background:#171310 radial-gradient(ellipse 120% 60% at 50% -10%, #241a12 0%, #171310 60%);
    color:#efe3cf; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
  h1,h2,h3{font-family:Georgia,'Times New Roman',serif; font-weight:400;}
  img{max-width:100%; display:block;}
  section{padding:56px 20px; position:relative;}
  .wrap{max-width:880px; margin:0 auto;}

  /* stitched leather panel: the leatherworker motif */
  .stitched{position:relative; background:#241c14; border:1px solid #3a2c1f; border-radius:14px;}
  .stitched::before{content:""; position:absolute; inset:7px; border:1.5px dashed rgba(201,151,63,.5);
    border-radius:9px; pointer-events:none;}

  /* ---------- hero: the forge ---------- */
  header{position:relative; overflow:hidden; text-align:center; padding:78px 20px 66px;
    background:radial-gradient(ellipse 90% 70% at 50% 108%, rgba(255,122,47,.28) 0%, rgba(201,73,26,.10) 40%, rgba(23,19,16,0) 70%), #14100c;
    border-bottom:1px solid #3a2c1f;}
  .embers{position:absolute; inset:0; overflow:hidden; pointer-events:none;}
  .embers span{position:absolute; bottom:-10px; border-radius:50%; background:#ff8a3c;
    box-shadow:0 0 6px 1px rgba(255,122,47,.7); opacity:0;}
  @keyframes riseA{0%{opacity:0; transform:translate(0,0);} 12%{opacity:.9;}
    100%{opacity:0; transform:translate(18px,-340px);}}
  @keyframes riseB{0%{opacity:0; transform:translate(0,0);} 12%{opacity:.8;}
    100%{opacity:0; transform:translate(-24px,-360px);}}
  #c-logo{box-shadow:0 0 0 3px #c9973f, 0 0 26px rgba(255,122,47,.45); position:relative; z-index:2;}
  .stamp{display:inline-block; position:relative; z-index:2; border:1px solid #c9973f; color:#c9973f;
    border-radius:999px; padding:6px 18px; font-size:12px; letter-spacing:.28em; text-transform:uppercase; margin-bottom:16px;}
  header h1{position:relative; z-index:2; font-size:clamp(38px,9vw,66px); line-height:1.02; color:#efe3cf;
    text-shadow:0 2px 22px rgba(255,122,47,.35);}
  header p{position:relative; z-index:2; margin-top:14px; font-size:18px; color:#cdb99c;
    font-style:italic; font-family:Georgia,serif;}
  .cta{display:inline-block; position:relative; z-index:2; margin-top:28px; text-decoration:none;
    background:linear-gradient(180deg,#ff7a2f,#c9491a); color:#14100c; font-weight:700; font-size:16.5px;
    padding:15px 32px; border-radius:10px; box-shadow:0 4px 20px rgba(255,122,47,.35);
    transition:transform .12s ease, box-shadow .2s ease;}
  .cta:active{transform:translateY(2px); box-shadow:0 2px 8px rgba(255,122,47,.3);}

  h2{font-size:clamp(26px,5.5vw,38px); text-align:center; color:#efe3cf;}
  h2::after{content:""; display:block; width:58px; height:3px; margin:12px auto 0; border-radius:2px;
    background:linear-gradient(90deg,#ff7a2f,#c9973f);}
  .kicker{text-align:center; color:#c9973f; letter-spacing:.3em; text-transform:uppercase; font-size:12px; margin-bottom:10px;}

  /* ---------- catalog: parchment board ---------- */
  .board{background:#efe3cf; color:#241a10; border-radius:14px; padding:28px 24px; margin-top:30px;
    border:1px solid #5c3a24; box-shadow:inset 0 0 40px rgba(92,58,36,.22), 0 10px 30px rgba(0,0,0,.4);
    position:relative;}
  .board::before{content:""; position:absolute; inset:8px; border:1.5px dashed rgba(92,58,36,.4);
    border-radius:8px; pointer-events:none;}
  .mitem{display:flex; align-items:baseline; gap:10px; padding:13px 6px; border-bottom:1px dashed #c7b291;}
  .mitem:last-child{border-bottom:none;}
  .mleft{min-width:0;}
  .mname{font-family:Georgia,serif; font-weight:700; font-size:17px;}
  .mdesc{color:#6d5942; font-size:13.5px; margin-top:3px;}
  .mdots{flex:1; border-bottom:2px dotted #b39a75; transform:translateY(-4px);}
  .mprice{font-family:Georgia,serif; font-weight:700; color:#a3400f; font-size:17px; white-space:nowrap;}

  /* ---------- workshop ---------- */
  .shop{background:linear-gradient(180deg,#14100c 0%, #1c1712 100%); border-top:1px solid #3a2c1f; border-bottom:1px solid #3a2c1f;}
  .toolTabs{display:flex; gap:10px; margin-top:28px;}
  .toolTabs button{flex:1; font-family:Georgia,serif; font-size:16px; color:#cdb99c; background:#241c14;
    border:1px solid #3a2c1f; border-radius:10px; padding:13px 4px; cursor:pointer; transition:all .15s ease;}
  .toolTabs button.on{background:linear-gradient(180deg,#ff7a2f,#c9491a); color:#14100c; font-weight:700;
    border-color:#ff7a2f; box-shadow:0 3px 16px rgba(255,122,47,.35);}
  .toolPanel{display:none; margin-top:20px;}
  .toolPanel.on{display:block;}
  .grp{margin-top:18px;}
  .grp .gname{font-size:11.5px; letter-spacing:.24em; text-transform:uppercase; color:#c9973f; margin-bottom:9px;}
  .opts{display:flex; flex-wrap:wrap; gap:9px;}
  .opt{font-family:inherit; font-size:14px; color:#e6d6bc; background:#241c14; border:1px solid #4a3826;
    border-radius:999px; padding:10px 15px; cursor:pointer; transition:all .13s ease;}
  .opt.on{border-color:#ff7a2f; background:rgba(255,122,47,.14); color:#ffd9bd;
    box-shadow:0 0 12px rgba(255,122,47,.25);}
  .opt .up{opacity:.6; font-size:12.5px;}
  .estBar{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-top:24px;
    background:#0f0c09; border:1px solid #3a2c1f; border-radius:14px; padding:16px 20px;
    box-shadow:inset 0 0 30px rgba(255,122,47,.08);}
  .estBar .lab{font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#a8917a;}
  .estBar .val{font-size:34px; font-weight:700; font-family:Georgia,serif; color:#ff9a52;
    text-shadow:0 0 18px rgba(255,122,47,.55); animation:heatup .5s ease-out;}
  @keyframes heatup{0%{transform:scale(1.22); color:#ffd9bd; text-shadow:0 0 30px rgba(255,160,80,.95);}
    100%{transform:scale(1);}}
  .estNote{margin-top:10px; font-size:12.5px; color:#a8917a; text-align:center;}
  .sendBtn{display:block; width:100%; font-family:Georgia,serif; margin-top:16px;
    background:linear-gradient(180deg,#ff7a2f,#c9491a); color:#14100c; font-weight:700; font-size:17px;
    border:none; border-radius:12px; padding:15px; cursor:pointer; box-shadow:0 4px 18px rgba(255,122,47,.3);
    transition:transform .1s ease;}
  .sendBtn:active{transform:translateY(2px);}
  .designOut{display:none; margin-top:14px;}
  .designOut.on{display:block;}
  .designOut textarea{width:100%; min-height:170px; font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:13px; background:#0f0c09; color:#e6d6bc; border:1px solid #3a2c1f; border-radius:12px; padding:12px;}
  .outRow{display:flex; gap:10px; margin-top:10px;}
  .outRow button, .outRow a{flex:1; font-family:inherit; text-align:center; font-size:14.5px; color:#e6d6bc;
    background:#241c14; border:1px solid #4a3826; border-radius:10px; padding:12px; cursor:pointer; text-decoration:none;}

  /* ---------- schedule: iron ---------- */
  .sched{background:#171310;}
  .schedtbl{width:100%; border-collapse:collapse; margin-top:26px; font-size:15.5px;}
  .schedtbl td{padding:15px 8px; border-bottom:1px solid #2c231a;}
  .schedtbl td:first-child{font-family:Georgia,serif; font-weight:700; color:#c9973f; text-transform:uppercase;
    font-size:13px; letter-spacing:.12em; width:86px;}
  .schedtbl td:last-child{color:#a8917a; text-align:right; font-size:13.5px;}

  /* ---------- gallery ---------- */
  .gal{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; margin-top:28px;}
  .gal img, .gal .ph{aspect-ratio:1; width:100%; object-fit:cover; border-radius:10px;
    border:1px solid #3a2c1f; box-shadow:0 6px 18px rgba(0,0,0,.45);}
  .ph{background:repeating-linear-gradient(45deg,#241c14,#241c14 12px,#2b2118 12px,#2b2118 24px);
    display:flex; align-items:center; justify-content:center; color:#7a6650; font-size:12.5px;
    letter-spacing:.1em; text-transform:uppercase; min-height:150px;}

  /* ---------- footer ---------- */
  footer{background:#14100c; text-align:center; padding:64px 20px; border-top:1px solid #3a2c1f;
    position:relative; overflow:hidden;}
  footer::before{content:""; position:absolute; left:0; right:0; bottom:0; height:120px;
    background:radial-gradient(ellipse 80% 100% at 50% 120%, rgba(255,122,47,.15), rgba(0,0,0,0) 70%); pointer-events:none;}
  footer h2::after{margin-bottom:4px;}
  footer p{position:relative;}
  #c-quote{margin-top:18px !important; font-size:21px !important; color:#efe3cf !important;}
  footer .cta{margin-top:24px;}
  footer .ig{display:block; position:relative; margin-top:18px; color:#c9973f; text-decoration:none; font-size:15px;}
  #c-pay{color:#a8917a !important;}
  .fine{position:relative; margin-top:26px; font-size:12px; color:#6d5942;}

  /* ---------- scroll reveal ---------- */
  .rv{opacity:0; transform:translateY(18px);}
  .rv.in{opacity:1; transform:none; transition:opacity .65s ease, transform .65s ease;}
  @media (prefers-reduced-motion: reduce){
    .rv{opacity:1; transform:none;}
    .embers{display:none;}
    .estBar .val{animation:none;}
    .cta,.sendBtn,.toolTabs button,.opt{transition:none;}
  }
</style>
</head>
<body>

<header>
  <div class="embers" aria-hidden="true"></div>
  <img id="c-logo" alt="" style="width:110px; height:110px; border-radius:50%; background:#efe3cf; padding:6px; margin:0 auto 16px; display:none;">
  <div class="stamp" id="c-stamp"></div>
  <h1 id="c-name"></h1>
  <p id="c-tagline"></p>
  <a class="cta" href="#find" id="c-hero"></a>
</header>

<section>
  <div class="wrap">
    <div class="kicker" id="c-l1"></div>
    <h2 id="c-l2"></h2>
    <div class="board" id="c-menu"></div>
    <p style="text-align:center; margin-top:14px; color:#8a7a6a; font-size:13px;" id="c-menunote"></p>
  </div>
</section>

<section class="shop">
  <div class="wrap">
    <div class="kicker">The workshop</div>
    <h2>Design your own</h2>
    <p style="text-align:center; margin-top:10px; font-size:15px; opacity:.8;">Build it piece by piece. Send the design, get a real quote.</p>
    <div class="toolTabs" id="toolTabs"></div>
    <div id="toolPanels"></div>
  </div>
</section>

<section class="sched" id="find">
  <div class="wrap">
    <div class="kicker" id="c-l3"></div>
    <h2 id="c-l4"></h2>
    <table class="schedtbl" id="c-sched"></table>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="kicker" id="c-l5"></div>
    <h2 id="c-l6"></h2>
    <div class="gal" id="c-gallery"></div>
  </div>
</section>

<footer>
  <h2 id="c-l7"></h2>
  <p style="margin-top:14px; font-size:19px; font-style:italic; font-family:Georgia,serif;" id="c-quote"></p>
  <a class="cta" id="c-cta2" href="#" target="_blank" rel="noopener"></a>
  <a class="ig" id="c-ig" href="#" target="_blank" rel="noopener"></a>
  <p style="margin-top:14px; font-size:13.5px; opacity:.85;" id="c-pay"></p>
  <div class="fine">Design preview by Mot Buchanan · prices are samples unless confirmed · forged edition v2</div>
</footer>

<script>
"use strict";
/* ================= CONFIG =================
   ARCHETYPE: Roamer (the schedule is the product)
   FITS: food truck, snow cone trailer, flea market vendor, farmers market maker,
         craft table (candles, woodwork, jerky, engraving), plant seller
   THEMES: "" = flame (food) · "maker" = teal/craft (market vendors, makers)
   LABELS: swap "Menu" to "Catalog", "The board" to "The table", etc. for makers
   ========================================== */
var CONFIG = {
  theme: "maker",
  logo: "bsa-logo.jpg",
  name: "Bright Sword Artisan",
  tagline: "Leather goods, hand-turned pens, and knives.",
  stamp: "Handmade in Massillon, Ohio",
  facebookUrl: "https://www.facebook.com/share/1Gzo5dJATD/",
  facebookText: "Bright Sword Artisan on Facebook",
  ctaText: "Ask about custom work",
  quote: "\u201CIf you can think of it, we can make it.\u201D",
  payLine: "Cash \u00B7 PayPal \u00B7 Cash App",
  menuNote: "Pens, knives, and bags are one-of-a-kind and priced per piece.",
  menu: [
    { name: "Design-Your-Own Bookmark", desc: "Pick the leather, watch it made", price: "$5" },
    { name: "Straps", desc: "", price: "$5" },
    { name: "Minimalist Wallet", desc: "Cards + cash, pocket-flat", price: "$15" },
    { name: "Traveler's Journal", desc: "Refillable leather cover, made to age well", price: "$25" },
    { name: "Clutch", desc: "Full-grain leather, snap close", price: "$70" },
    { name: "Hand-Turned Pens", desc: "Wood and resin, no two alike", price: "per piece" },
    { name: "Knives", desc: "With hand-stitched leather sheath", price: "per piece" },
    { name: "Backpacks & Bags", desc: "Built to outlast the trend", price: "per piece" }
  ],
  schedule: [
    { day: "Sat", where: "Sample: craft show name here", when: "9a\u20133p" },
    { day: "Sat", where: "Sample: next booked show", when: "10a\u20134p" },
    { day: "Sun", where: "Sample: holiday market", when: "11a\u20135p" }
  ],
  photos: ["bsa-wallet.jpg","bsa-knives.jpg","bsa-pens.jpg","bsa-minis.jpg","bsa-belts.jpg","bsa-display.jpg"],
  galleryCount: 6,
  labels: {
    menuKicker: "The table", menu: "Catalog",
    schedKicker: "On the road", sched: "Find the booth", hero: "Find the booth",
    galKicker: "Off the bench", gal: "The work",
    footer: "Custom work"
  }
};
/* ========================================== */
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

/* ============ Design-your-own configurators ============ */
var TOOLS = [
  { id:"pen", title:"Pen", intro:"Hand-turned on the lathe.",
    groups:[
      { name:"Style", opts:[["Slimline",35],["Cigar (full-body)",45],["Bolt-action",50]] },
      { name:"Stock", opts:[["Maple",0],["Walnut",0],["Padauk",5],["Wenge",5],["Leopardwood",8],["Resin swirl",8]] },
      { name:"Hardware", opts:[["Chrome",0],["Gunmetal",3],["Gold",5],["Antique copper",5]] },
      { name:"Ink", opts:[["Black",0],["Blue",0]] }
    ]},
  { id:"knife", title:"Knife", intro:"Fixed blade, hand-stitched sheath included.",
    groups:[
      { name:"Blade", opts:[["3\u2033 drop point",85],["3.5\u2033 drop point",95],["4\u2033 clip point",105]] },
      { name:"Steel", opts:[["High-carbon",0],["Stainless",10],["Damascus",60]] },
      { name:"Handle", opts:[["Oak",0],["Walnut",5],["Wenge",10],["Leopardwood",15]] },
      { name:"Bolster", opts:[["None",0],["Brass",12]] },
      { name:"Sheath leather", opts:[["Tan",0],["Brown",0],["Dark brown",0],["Black",0]] },
      { name:"Initials stamp", opts:[["None",0],["Stamped",5]] }
    ]},
  { id:"wallet", title:"Wallet", intro:"Cut, dyed, and saddle-stitched by hand.",
    groups:[
      { name:"Style", opts:[["Minimalist (elastic)",15],["Card holder",25],["Trifold",45],["Snap clutch",70]] },
      { name:"Leather", opts:[["Veg-tan natural",0],["Brown",0],["Black",0],["Forest green",0],["Navy",0],["Oil-tanned pull-up",10]] },
      { name:"Thread", opts:[["Natural",0],["Black",0],["Contrast gold",0]] },
      { name:"Monogram stamp", opts:[["None",0],["Stamped",5]] }
    ]}
];
var toolSel = {};   // toolSel[toolId] = [optIndex per group]

function toolPrice(t){
  var sum = 0, sel = toolSel[t.id];
  for (var g=0; g<t.groups.length; g++) sum += t.groups[g].opts[sel[g]][1];
  return sum;
}
function renderToolPanel(t){
  var sel = toolSel[t.id];
  var h = '<p style="opacity:.75; font-size:14.5px; margin-top:2px;">'+esc(t.intro)+'</p>';
  for (var g=0; g<t.groups.length; g++){
    var grp = t.groups[g];
    h += '<div class="grp"><div class="gname">'+esc(grp.name)+'</div><div class="opts">';
    for (var o=0; o<grp.opts.length; o++){
      var up = grp.opts[o][1];
      var upTxt = (g===0) ? ' <span class="up">$'+up+'</span>' : (up>0 ? ' <span class="up">+$'+up+'</span>' : '');
      h += '<button class="opt'+(sel[g]===o?" on":"")+'" data-tool="'+t.id+'" data-g="'+g+'" data-o="'+o+'">'+esc(grp.opts[o][0])+upTxt+'</button>';
    }
    h += '</div></div>';
  }
  h += '<div class="estBar"><span class="lab">Estimated</span><span class="val">$'+toolPrice(t)+'</span></div>'
     + '<div class="estNote">Sample estimate for this design. Final quote comes from the maker.</div>'
     + '<button class="sendBtn" data-send="'+t.id+'">Send this design</button>'
     + '<div class="designOut" id="out-'+t.id+'"><textarea readonly id="txt-'+t.id+'"></textarea>'
     + '<div class="outRow"><button data-copy="'+t.id+'">Copy design</button>'
     + '<a href="'+esc(CONFIG.facebookUrl)+'" target="_blank" rel="noopener">Open Facebook</a></div>'
     + '<div class="estNote">Copy, then paste it in a message to the shop.</div></div>';
  return h;
}
function renderTools(activeId){
  var tabs = "", panels = "";
  for (var i=0;i<TOOLS.length;i++){
    var t = TOOLS[i];
    if (!toolSel[t.id]){
      toolSel[t.id] = [];
      for (var g=0; g<t.groups.length; g++) toolSel[t.id].push(0);
    }
    var on = (t.id === activeId);
    tabs += '<button data-tooltab="'+t.id+'"'+(on?' class="on"':'')+'>'+esc(t.title)+'</button>';
    panels += '<div class="toolPanel'+(on?" on":"")+'" id="panel-'+t.id+'">'+renderToolPanel(t)+'</div>';
  }
  document.getElementById("toolTabs").innerHTML = tabs;
  document.getElementById("toolPanels").innerHTML = panels;
}
function toolById(id){
  for (var i=0;i<TOOLS.length;i++) if (TOOLS[i].id===id) return TOOLS[i];
  return null;
}
function designText(t){
  var sel = toolSel[t.id], lines = [];
  lines.push("Custom " + t.title.toLowerCase() + " request \u2014 " + CONFIG.name);
  for (var g=0; g<t.groups.length; g++){
    lines.push(t.groups[g].name + ": " + t.groups[g].opts[sel[g]][0]);
  }
  lines.push("Estimated: $" + toolPrice(t) + " (sample estimate)");
  lines.push("My name: ");
  lines.push("Best way to reach me: ");
  return lines.join("\n");
}
document.addEventListener("click", function(e){
  var el = e.target.closest ? e.target.closest("[data-tooltab],[data-tool],[data-send],[data-copy]") : null;
  if (!el) return;
  if (el.hasAttribute("data-tooltab")){ renderTools(el.getAttribute("data-tooltab")); return; }
  if (el.hasAttribute("data-tool")){
    var id = el.getAttribute("data-tool");
    toolSel[id][parseInt(el.getAttribute("data-g"),10)] = parseInt(el.getAttribute("data-o"),10);
    document.getElementById("panel-"+id).innerHTML = renderToolPanel(toolById(id));
    return;
  }
  if (el.hasAttribute("data-send")){
    var sid = el.getAttribute("data-send");
    document.getElementById("txt-"+sid).value = designText(toolById(sid));
    document.getElementById("out-"+sid).classList.add("on");
    return;
  }
  if (el.hasAttribute("data-copy")){
    var cid = el.getAttribute("data-copy");
    var ta = document.getElementById("txt-"+cid);
    ta.select(); ta.setSelectionRange(0, 99999);
    var done = function(){ el.textContent = "Copied"; setTimeout(function(){ el.textContent = "Copy design"; }, 1500); };
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(ta.value).then(done).catch(function(){ try{ document.execCommand("copy"); done(); }catch(err){} });
    } else { try{ document.execCommand("copy"); done(); }catch(err){} }
    return;
  }
});

function build(){
  if (CONFIG.theme) document.body.className = "t-" + CONFIG.theme;
  var L = CONFIG.labels;
  $("c-l1").textContent = L.menuKicker; $("c-l2").textContent = L.menu;
  $("c-l3").textContent = L.schedKicker; $("c-l4").textContent = L.sched;
  $("c-l5").textContent = L.galKicker; $("c-l6").textContent = L.gal;
  $("c-l7").textContent = L.footer;
  $("c-hero").textContent = L.hero;
  $("c-quote").textContent = CONFIG.quote;
  $("c-pay").textContent = CONFIG.payLine;
  if (CONFIG.logo){
    var lg = $("c-logo"); lg.src = CONFIG.logo; lg.style.display = "block";
  }
  document.title = CONFIG.name;
  $("c-name").textContent = CONFIG.name;
  $("c-tagline").textContent = CONFIG.tagline;
  $("c-stamp").textContent = CONFIG.stamp;
  $("c-menunote").textContent = CONFIG.menuNote;

  var m = "";
  for (var i=0;i<CONFIG.menu.length;i++){
    var it = CONFIG.menu[i];
    m += '<div class="mitem"><div class="mleft"><div class="mname">'+esc(it.name)+'</div>'
       + (it.desc?('<div class="mdesc">'+esc(it.desc)+'</div>'):"")
       + '</div><div class="mdots"></div><div class="mprice">'+esc(it.price)+'</div></div>';
  }
  $("c-menu").innerHTML = m;

  var sc = "";
  for (var d=0;d<CONFIG.schedule.length;d++){
    var row = CONFIG.schedule[d];
    sc += '<tr><td>'+esc(row.day)+'</td><td>'+esc(row.where)+'</td><td>'+esc(row.when)+'</td></tr>';
  }
  $("c-sched").innerHTML = sc;

  var g = "";
  var n = Math.max(CONFIG.photos.length, CONFIG.galleryCount);
  for (var k=0;k<n;k++){
    g += CONFIG.photos[k] ? '<img src="'+esc(CONFIG.photos[k])+'" alt="">' : '<div class="ph">Photo</div>';
  }
  $("c-gallery").innerHTML = g;

  $("c-cta2").textContent = CONFIG.ctaText;
  $("c-cta2").href = CONFIG.facebookUrl;
  if (CONFIG.facebookUrl){
    $("c-ig").textContent = CONFIG.facebookText;
    $("c-ig").href = CONFIG.facebookUrl;
  } else { $("c-ig").style.display = "none"; }
  renderTools("pen");
}
build();

/* ---------- forge FX ---------- */
(function(){
  var reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduced) return;
  // embers
  var host = document.querySelector(".embers");
  if (host){
    for (var i=0;i<14;i++){
      var e = document.createElement("span");
      var size = 3 + Math.random()*4;
      e.style.width = size + "px"; e.style.height = size + "px";
      e.style.left = (6 + Math.random()*88) + "%";
      e.style.animation = (Math.random()<0.5?"riseA":"riseB") + " " + (4.5+Math.random()*5).toFixed(1) + "s linear " + (Math.random()*6).toFixed(1) + "s infinite";
      host.appendChild(e);
    }
  }
  // scroll reveal
  if ("IntersectionObserver" in window){
    var targets = document.querySelectorAll("section .wrap > *, footer > *");
    var io = new IntersectionObserver(function(entries){
      for (var j=0;j<entries.length;j++){
        if (entries[j].isIntersecting){ entries[j].target.classList.add("in"); io.unobserve(entries[j].target); }
      }
    }, { rootMargin: "0px 0px -40px 0px" });
    for (var k=0;k<targets.length;k++){ targets[k].classList.add("rv"); io.observe(targets[k]); }
  }
})();
</script>
