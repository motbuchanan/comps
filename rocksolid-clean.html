<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Solid Services — Clean & Clear</title>
<style>
  :root{ --paper:#f7fbfc; --ink:#17313c; --mute:#5f7c88; --accent:#1e8fae; --sky:#7fdcea; --sand:#e8f2f5; --line:#d7e6ea; }
  *{box-sizing:border-box; margin:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--paper); color:var(--ink); font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;}
  img{max-width:100%; display:block;}
  h1,h2,h3{font-family:Georgia,"Times New Roman",serif; font-weight:400; letter-spacing:-.01em; line-height:1.12;}
  section{padding:64px 22px;}
  .wrap{max-width:760px; margin:0 auto;}
  .kicker{color:var(--accent); letter-spacing:.26em; text-transform:uppercase; font-size:11.5px; font-weight:700;
    text-align:center; margin-bottom:14px;}
  h2{font-size:clamp(28px,6vw,40px); text-align:center;}
  .sub{color:var(--mute); text-align:center; max-width:560px; margin:14px auto 0; font-size:16px;}
  a{color:inherit;}
  .btn{display:inline-block; font-weight:700; font-size:16px; padding:16px 30px; border-radius:999px;
    text-decoration:none; transition:transform .12s ease, box-shadow .12s ease;}
  .btn-primary{background:var(--accent); color:#fff; box-shadow:0 8px 24px rgba(30,143,174,.25);}
  .btn-primary:hover{transform:translateY(-2px);}
  .btn-ghost{background:#fff; color:var(--ink); border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--accent);}
  .btns{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}
  .fade{opacity:0; transform:translateY(14px); transition:opacity .6s ease, transform .6s ease;}
  .fade.in{opacity:1; transform:none;}

  header{padding:88px 22px 64px; text-align:center;}
  .eyebrow{display:inline-block; color:var(--accent); letter-spacing:.26em; text-transform:uppercase;
    font-size:12px; font-weight:700; margin-bottom:22px;}
  header h1{font-size:clamp(42px,10vw,72px);}
  header .tag{margin-top:18px; font-size:clamp(17px,3.6vw,21px); color:var(--mute); font-style:italic;
    font-family:Georgia,serif; max-width:520px; margin-left:auto; margin-right:auto;}
  .hero-btns{margin-top:32px;}
  .trust{margin-top:24px; color:var(--mute); font-size:14px; display:flex; gap:8px 24px; justify-content:center; flex-wrap:wrap;}
  .trust b{color:var(--ink);}
  .waveline{max-width:340px; margin:34px auto 0;}
  .waveline svg{width:100%; height:20px; display:block;}
  .waveline path{stroke:var(--sky); stroke-width:2.5; fill:none; stroke-linecap:round;
    stroke-dasharray:4 10; animation:wflow 1.6s linear infinite;}
  @keyframes wflow{ to{ stroke-dashoffset:-14; } }

  .svc{border-top:1px solid var(--line); padding:26px 0; display:grid; grid-template-columns:1fr 96px; gap:18px; align-items:center;}
  .svc:last-child{border-bottom:1px solid var(--line);}
  .svc h3{font-size:21px;}
  .svc p{margin-top:6px; color:var(--mute); font-size:15px;}
  .svc img{width:96px; height:96px; object-fit:cover; border-radius:14px;}
  .svc-list{margin-top:34px;}

  .check{background:var(--sand); text-align:center;}
  .check .cardy{background:#fff; border:1px solid var(--line); border-radius:20px; padding:34px 26px; margin-top:30px;}
  .check h3{font-size:24px;}
  .check p{color:var(--mute); margin-top:10px; font-size:15.5px; max-width:480px; margin-left:auto; margin-right:auto;}
  .check .btn{margin-top:22px;}

  .work-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:34px;}
  .wcard{position:relative; border-radius:16px; overflow:hidden; border:1px solid var(--line); background:#fff;}
  .wcard img{aspect-ratio:4/3; object-fit:cover; width:100%;}
  .wcard .cap{position:absolute; left:0; right:0; bottom:0; padding:18px 14px 10px; color:#fff;
    background:linear-gradient(180deg,rgba(23,49,60,0),rgba(23,49,60,.85));
    font-size:12px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; font-family:system-ui;}

  .rev{border-top:1px solid var(--line);}
  .rcard{border-left:3px solid var(--sky); padding:6px 0 6px 22px; margin-top:30px;}
  .rcard .q{font-family:Georgia,serif; font-style:italic; font-size:18px; line-height:1.6;}
  .rcard .who{margin-top:10px; color:var(--accent); font-weight:700; font-size:14px; font-family:system-ui;}

  footer{background:var(--ink); color:#eaf6f8; text-align:center; padding:72px 22px;}
  footer h2{color:#fff;}
  footer .area{margin-top:14px; color:#9db8c2; font-size:15px; max-width:520px; margin-left:auto; margin-right:auto;}
  footer .btns{margin-top:28px;}
  footer .btn-ghost{background:transparent; color:#eaf6f8; border-color:#2a5060;}
  .fine{margin-top:30px; font-size:12px; color:#5b7f8c;}
  .vbadge{position:fixed; left:10px; bottom:10px; z-index:50; background:#fff; border:1px solid var(--line);
    color:var(--mute); font-size:11px; padding:5px 9px; border-radius:8px;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition-duration:.001s !important; scroll-behavior:auto !important;}
    .fade{opacity:1; transform:none;}
  }
</style>
</head>
<body>

<header>
  <span class="eyebrow" id="c-eyebrow"></span>
  <h1 id="c-name"></h1>
  <p class="tag" id="c-tag"></p>
  <div class="btns hero-btns">
    <a class="btn btn-primary" id="c-cta1" href="#">Text us</a>
    <a class="btn btn-ghost" id="c-call" href="#">Call</a>
  </div>
  <div class="trust" id="c-trust"></div>
  <div class="waveline" aria-hidden="true"><svg viewBox="0 0 340 20"><path d="M2 10 Q30 2 58 10 T114 10 T170 10 T226 10 T282 10 T338 10"/></svg></div>
</header>

<section>
  <div class="wrap fade">
    <div class="kicker">What we do</div>
    <h2>Water, handled properly</h2>
    <div class="svc-list" id="c-services"></div>
  </div>
</section>

<section class="check">
  <div class="wrap fade">
    <div class="kicker">Not sure what's wrong?</div>
    <h2>The 60-second water check</h2>
    <div class="cardy">
      <h3 id="c-checkh"></h3>
      <p id="c-checkp"></p>
      <a class="btn btn-primary" id="c-checkbtn" href="#">Try it</a>
    </div>
  </div>
</section>

<section>
  <div class="wrap fade">
    <div class="kicker">Recent work</div>
    <h2>Done right, left clean</h2>
    <div class="work-grid" id="c-work"></div>
  </div>
</section>

<section class="rev">
  <div class="wrap fade">
    <div class="kicker">Neighbors</div>
    <h2>What people say</h2>
    <div id="c-reviews"></div>
  </div>
</section>

<footer>
  <div class="wrap">
    <h2 id="c-close"></h2>
    <div class="area" id="c-area"></div>
    <div class="btns">
      <a class="btn btn-primary" id="c-cta2" href="#">Text us</a>
      <a class="btn btn-ghost" id="c-call2" href="#">Call</a>
    </div>
    <div class="fine">Design preview by Mot Buchanan · "Clean &amp; Clear" direction · copy, reviews, and prices are samples</div>
  </div>
</footer>

<div class="vbadge" id="vbadge"></div>

<script>
"use strict";
/* ================= CONFIG =================
   DIRECTION: "Clean & Clear" — light, airy, trustworthy neighbor.
   One motion moment: the flowing waterline under the hero + gentle fade-ups.
   ========================================== */
var CONFIG = {
  eyebrow: "Well & water · Ashland, Ohio",
  name: "Rock Solid Services",
  tag: "Clear water, steady pressure, and a truck that shows up when it said it would.",
  phone: "4195550100",
  trust: ["<b>Licensed &amp; insured</b>", "Same-day when we can", "One call, one guy, done right"],
  services: [
    { h: "Well Pumps & Pressure Tanks", p: "Diagnosed honestly, repaired or replaced fast.",
      img: "https://images.squarespace-cdn.com/content/v1/67dc550166a7a678e3eb6908/207817c6-7e08-47e1-92f6-fb6d4adebc4e/PXL_20250424_201608435.jpg" },
    { h: "Water Lines & Trenching", p: "New lines and yard hydrants without wrecking the yard.",
      img: "https://images.squarespace-cdn.com/content/v1/67dc550166a7a678e3eb6908/5f7a69c3-5f6a-49b8-9035-fc11b7b0df0c/545913879_122142387218804695_4050206806843302217_n.jpg" },
    { h: "Plumbing Repairs", p: "Leaks found, not guessed at.",
      img: "https://images.squarespace-cdn.com/content/v1/67dc550166a7a678e3eb6908/186788ac-6793-40ea-82e0-4332993e59d0/PXL_20250428_175923083.jpg" },
    { h: "Water Treatment", p: "Tested first, then treated — never oversold.",
      img: "https://images.squarespace-cdn.com/content/v1/67dc550166a7a678e3eb6908/29748cb3-c7ba-466c-a03b-2df4b9491a84/main+image.jpeg" }
  ],
  checkH: "Tap what you're seeing, learn the likely cause",
  checkP: "No water, low pressure, rusty stains, a wet spot in the yard — pick the symptom and it tells you what it probably is, what to check, and starts a text to Paul with the story already written.",
  work: [
    { img: "https://images.squarespace-cdn.com/content/v1/67dc550166a7a678e3eb6908/5f7a69c3-5f6a-49b8-9035-fc11b7b0df0c/545913879_122142387218804695_4050206806843302217_n.jpg", cap: "Water line & trenching" },
    { img: "https://images.squarespace-cdn.com/content/v1/67dc550166a7a678e3eb6908/207817c6-7e08-47e1-92f6-fb6d4adebc4e/PXL_20250424_201608435.jpg", cap: "Pressure tank & pump" },
    { img: "https://images.squarespace-cdn.com/content/v1/67dc550166a7a678e3eb6908/186788ac-6793-40ea-82e0-4332993e59d0/PXL_20250428_175923083.jpg", cap: "Plumbing repair" },
    { img: "https://images.squarespace-cdn.com/content/v1/67dc550166a7a678e3eb6908/29748cb3-c7ba-466c-a03b-2df4b9491a84/main+image.jpeg", cap: "Treatment install" }
  ],
  reviews: [
    { q: "Woke up to no water before work. Paul had us running again by lunch and showed me what went wrong.", who: "Homeowner, Savannah" },
    { q: "Replaced our pressure tank and cleaned up like he was never here. Fair price, no upsell.", who: "Well owner, Jeromesville" },
    { q: "New water line out to the barn, trenched and done in a day.", who: "Loudonville customer" }
  ],
  close: "Water trouble doesn't wait. Neither do we.",
  area: "Serving Ashland County and the neighbors — Loudonville, Perrysville, Jeromesville, Savannah, Polk, and out to Mansfield and Wooster.",
  version: "clean · v1 · Jul 19"
};
/* ========================================== */
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

function build(){
  document.title = CONFIG.name + " — Clean & Clear";
  $("c-eyebrow").textContent = CONFIG.eyebrow;
  $("c-name").textContent = CONFIG.name;
  $("c-tag").textContent = CONFIG.tag;
  $("c-close").textContent = CONFIG.close;
  $("c-area").textContent = CONFIG.area;
  $("c-checkh").textContent = CONFIG.checkH;
  $("c-checkp").textContent = CONFIG.checkP;
  var sms = "sms:"+CONFIG.phone, tel = "tel:"+CONFIG.phone;
  $("c-cta1").href = sms; $("c-cta2").href = sms; $("c-checkbtn").href = sms;
  $("c-call").href = tel; $("c-call2").href = tel;

  var t = "";
  for (var i=0;i<CONFIG.trust.length;i++) t += "<span>"+CONFIG.trust[i]+"</span>";
  $("c-trust").innerHTML = t;   // trusted config

  var s = "";
  for (var j=0;j<CONFIG.services.length;j++){
    var sv = CONFIG.services[j];
    s += '<div class="svc"><div><h3>'+esc(sv.h)+'</h3><p>'+esc(sv.p)+'</p></div><img alt="" src="'+esc(sv.img)+'"></div>';
  }
  $("c-services").innerHTML = s;

  var w = "";
  for (var k=0;k<CONFIG.work.length;k++){
    w += '<div class="wcard"><img alt="" src="'+esc(CONFIG.work[k].img)+'"><div class="cap">'+esc(CONFIG.work[k].cap)+'</div></div>';
  }
  $("c-work").innerHTML = w;

  var r = "";
  for (var v=0;v<CONFIG.reviews.length;v++){
    r += '<div class="rcard"><div class="q">\u201C'+esc(CONFIG.reviews[v].q)+'\u201D</div><div class="who">'+esc(CONFIG.reviews[v].who)+'</div></div>';
  }
  $("c-reviews").innerHTML = r;

  $("vbadge").textContent = CONFIG.version;

  // gentle fade-ups
  var fades = document.querySelectorAll(".fade");
  if ("IntersectionObserver" in window){
    var io = new IntersectionObserver(function(es){
      for (var e=0;e<es.length;e++) if (es[e].isIntersecting){ es[e].target.classList.add("in"); io.unobserve(es[e].target); }
    }, {threshold:.12});
    for (var f=0;f<fades.length;f++) io.observe(fades[f]);
  } else {
    for (var f2=0;f2<fades.length;f2++) fades[f2].classList.add("in");
  }
}
build();
</script>
</body>
</html>
